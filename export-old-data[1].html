<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تصدير بيانات Full Mark القديمة</title>
<style>
  body { font-family: Tahoma, Arial, sans-serif; background:#f4f6f9; padding:40px; text-align:center; }
  .box { max-width:520px; margin:0 auto; background:#fff; border-radius:12px; padding:30px; box-shadow:0 4px 14px rgba(0,0,0,.08); }
  button { background:#2563eb; color:#fff; border:none; padding:14px 28px; border-radius:8px; font-size:16px; cursor:pointer; margin-top:16px; }
  button:hover { background:#1d4ed8; }
  #status { margin-top:16px; font-weight:bold; }
  #count { color:#2563eb; }
</style>
</head>
<body>
  <div class="box">
    <h2>📦 تصدير بيانات أكاديمية Full Mark</h2>
    <p>افتح هذه الصفحة من <strong>نفس الجهاز والمتصفح</strong> اللي عليه التسجيلات القديمة (نفس الرابط القديم للمشروع)، ثم اضغط الزر لتنزيل نسخة احتياطية من كل البيانات كملف JSON.</p>
    <p id="count"></p>
    <button onclick="exportData()">⬇️ تنزيل نسخة احتياطية من البيانات</button>
    <p id="status"></p>
  </div>

<script>
  const raw = localStorage.getItem('fullMarkRegistrations');
  const data = raw ? JSON.parse(raw) : [];
  document.getElementById('count').textContent = `تم العثور على ${data.length} سجل مخزّن على هذا الجهاز.`;

  function exportData() {
    if (!data.length) {
      document.getElementById('status').textContent = 'لا توجد بيانات على هذا الجهاز لتصديرها.';
      return;
    }
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `fullmark-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    document.getElementById('status').textContent = '✅ تم تنزيل الملف بنجاح. احتفظ به لاستيراده لاحقًا.';
  }
</script>
</body>
</html>
